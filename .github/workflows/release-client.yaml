name: Generate Client Release

on:
  push:
    tags:
      - "v*" # Trigger on version tags like v1.2.3-dev
jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build client binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags "-X github.com/iim-protocol/iimp/client/cmd.Version=${{ github.ref_name }}" \
          -o dist/iimp-client-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
